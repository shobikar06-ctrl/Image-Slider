<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="slider">
    <img id="slideImg" src="https://picsum.photos/600/400?random=1" alt="slide">
    <div class="buttons">
      <button onclick="prevSlide()">Prev</button>
      <button onclick="nextSlide()">Next</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
